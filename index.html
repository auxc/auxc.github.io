<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8">
<style>
html {
  box-sizing: border-box;
  width: 100%;
  overflow-y: scroll;
  scrollbar-gutter: stable;
}

*, *::before, *::after {
  box-sizing: inherit;
}

body {
  font-family: Roboto, sans-serif;
  margin: 0;
  background: #f6f7f8;
  color: rgb(0 0 0 / 0.88);
}

li:nth-child(even) {
  background: rgb(0 0 0 / 0.005);
}

li {
  margin-bottom: 15px;
}

#appHeader {
  position: sticky;
  top: 0;
  z-index: 50;
  background: #fafafa;
  border-bottom: 1px solid rgb(0 0 0 / 0.12);
  box-shadow: 0 1px 4px rgb(0 0 0 / 0.06);
}

.headerInner,
.main-content {
  width: min(1100px, calc(100% - 24px));
  margin: 0 auto;
}

.headerInner {
  padding: 12px 0 10px;
}

.headerMetaRow {
  display: flex;
  justify-content: center;
  margin-bottom: 10px;
}

.headerTopRow {
  display: flex;
  align-items: stretch;
  gap: 12px;
}

.searchShell {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1 1 auto;
  min-width: 0;
}

.searchTools {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.searchContainer {
  display: flex;
  align-items: stretch;
  position: relative;
  min-height: 42px;
  margin: 0;
  white-space: nowrap;
  gap: 0;
  flex: 1 1 auto;
}

#searchInput {
  flex-grow: 1;
  min-width: 0;
  padding: 8px 40px 8px 12px;
  font-size: 15px;
  border: 1px solid rgb(0 0 0 / 0.5);
  border-left: 0;
  box-shadow: 0 2px 5px rgb(0 0 0 / 0.1);
  border-radius: 0;
  border-top-right-radius: 16px;
  border-bottom-right-radius: 16px;
}

#searchInput:focus {
  outline: none;
  box-shadow: inset 0 0 3.5px rgb(0 0 0 / 0.133);
}

.searchBuildIndicator {
  position: absolute;
  top: 50%;
  right: 13px;
  width: 16px;
  height: 16px;
  transform: translateY(-50%);
  pointer-events: none;
}

.searchBuildIndicator[hidden] {
  display: none;
}

.searchBuildSpinner {
  display: block;
  box-sizing: border-box;
  width: 16px;
  height: 16px;
  border: 2px solid rgb(0 0 0 / 0.16);
  border-top-color: rgb(0 0 0 / 0.7);
  border-radius: 50%;
  animation: spin 0.55s linear infinite;
}

.visuallyHidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}

.filterToggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 10ch;
  background-color: #f8f9fa;
  padding: 7px 12px;
  font-size: 13px;
  border: 1px solid rgb(0 0 0 / 0.2);
  border-radius: 999px;
  cursor: pointer;
  color: rgb(0 0 0 / 0.78);
  box-shadow: 0 2px 5px rgb(0 0 0 / 0.08);
  transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}

.filterToggle:hover {
  background-color: #eceff1;
}

.filterToggle[aria-expanded="true"] {
  background-color: #111827;
  border-color: #111827;
  color: #fff;
  box-shadow: 0 3px 10px rgb(17 24 39 / 0.18);
}

#searchContainerId {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 0;
}

#searchContainerId:empty {
  display: none;
}

.tagPanel {
  overflow-y: auto;
  overflow-x: hidden;
  max-height: min(280px, 40vh);
  opacity: 1;
  transition: max-height 0.2s ease, opacity 0.2s ease, padding 0.2s ease;
  margin: 6px 0;
  padding: 4px 0 2px;
}

.tagPanel.collapsed {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
}

#tagBox {
  list-style-type: none;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 10px;
  padding: 0;
  margin: 0;
}

#videoBox {
  list-style-type: none;
  padding-left: 0;
  margin-top: 0;
  margin-bottom: 0;
}

#results {
  list-style-type: none;
  padding-left: 0;
  margin: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.resultItem {
  margin-bottom: 8px;
  padding: 4px 6px;
  border-radius: 10px;
  scroll-margin-top: 96px;
}

.resultItem.is-selected {
  background: linear-gradient(180deg, rgba(11, 178, 255, 0.01), rgba(11, 178, 255, 0.05));
  box-shadow:
    inset 0 0 0 1px rgb(26 115 232 / 0.42),
    inset 0 0 0 2px rgb(255 255 255 / 0.55);
}

.resultItem.is-selected a {
  text-decoration: underline;
}

#results a,
#results small,
#results sup,
#output {
  overflow-wrap: anywhere;
  word-break: break-word;
}

.main-content {
  overflow: visible;
  padding: 16px 0 24px;
}

#output {
  font-family: monospace;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: rgb(0 0 0 / 0.65);
  font-size: 12px;
  line-height: 1.3;
  padding: 0;
}

.footerLink {
  color: rgb(0 0 0 / 0.8);
}

.tagLink {
  white-space: nowrap;
  text-decoration: none;
  color: rgb(255 255 255);
  text-shadow: 0 1px 3px rgb(64 64 64);
  font-weight: 500;
  font-size: 14px;
  line-height: 250%;
  border: 1px solid rgb(0 0 0 / 0.3);
  border-radius: 10px;
  box-shadow: 0 2px 5px rgb(0 0 0 / 0.1);
  padding: 5px 7px;
  display: inline-flex;
  align-items: center;
}

.tagCounter {
  color: rgb(255 255 255);
  text-decoration: none;
  text-shadow: 0 2px 50px rgba(220 220 220 255);
  margin-left: 8px;
  padding: 0 2px;
}

.tagSearchPill {
  white-space: nowrap;
  text-decoration: none;
  color: rgb(255 255 255);
  text-shadow: 0 1px 3px rgb(64 64 64);
  font-weight: 700;
  border-style: solid;
  border-top: 1px solid rgb(0 0 0 / 0.3);
  border-bottom: 1px solid rgb(0 0 0 / 0.3);
  border-right: 1px solid rgb(0 0 0 / 0.3);
  border-left: 0;
  box-shadow: 0 2px 5px rgb(0 0 0 / 0.1);
  padding: 7px 10px;
  border-radius: 999px;
  margin: 0;
  cursor: pointer;
}

.mainDropdown {
  padding: 3.5px 10px 15px 12px;
  border-radius: 0;
  border-top-left-radius: 16px;
  border-bottom-left-radius: 16px;
  border: 1px double rgb(0 0 0 / 0.4);
  min-width: 52px;
}

.mainDropdownIdleAnim {
  background:
   linear-gradient(rgba(255, 0, 0, 1) 0%, rgba(255, 154, 0, 1) 10%, rgba(208, 222, 33, 1) 20%, rgba(79, 220, 74, 1) 30%, rgba(63, 218, 216, 1) 40%, rgba(47, 201, 226, 1) 50%, rgba(28, 127, 238, 1) 60%, rgba(95, 21, 242, 1) 70%, rgba(186, 12, 248, 1) 80%, rgba(251, 7, 217, 1) 90%, rgba(255, 0, 0, 1) 100%)
   0 0 / 100% 200%;
  animation: rainbow 10s linear infinite;
  animation-direction: forward;
}

.extraResultContent {
  background: linear-gradient(rgba(32, 32, 32, 0.9) 0%, rgba(0, 0, 0, 1) 10%, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0) 100%);
  width: min(100%, 560px);
  max-width: 100%;
  max-height: 100%;
  margin-top: 8px;
  border-radius: 16px;
}

.videoModal {
  width: min(100%, 560px);
  max-width: 100%;
}

.videoShowAnim {
  animation: fadeIn 0.3s cubic-bezier(0.32, 0, 0.67, 0);
}

.videoButton {
  border-radius: 8px;
  border: 1px solid rgb(0 0 0 / 0.4);
  padding-bottom: 3.5px;
  position: relative;
  top: -2px;
  margin-left: 3px;
}

.videoButton:active {
  animation: pressDown 0.066s cubic-bezier(0.33, 1, 0.68, 1) 1;
}

.videoCloseButton {
  float: right;
  border-radius: 16px;
  background-color: transparent;
  color: rgb(255 255 255);
  border: 1px solid rgb(0 0 0 / 0.01);
}

.logo:hover, logo:active {
  animation: pressDown 0.1s linear 1;
  animation-fill-mode: forwards;
  color: rgb(255 255 255);
  text-shadow: 0 1px 6px rgb(0 0 0 / 0.3);
  display: inline-block;
}

.loader {
  border: 6px double #f3f3f3;
  border-top: 6px solid rgb(0 0 0 / 0.66);
  border-radius: 50%;
  width: 33px;
  height: 33px;
  animation: spin 0.33s linear infinite;
  margin: 12px auto;
}

.modal-bar {
  align-items: center;
  padding: 8px 0 12px;
  width: 100%;
  box-sizing: border-box;
}

.modal-bar.hidden {
  display: none;
}

.dropdown {
  position: relative;
  display: inline-block;
}

.dropbtn {
  background-color: #f8f9fa;
  padding: 4px 8px;
  font-size: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.dropbtn:hover {
  background-color: #e9ecef;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #fff;
  min-width: 120px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  border: 1px solid #ddd;
  border-radius: 3px;
  z-index: 1;
}

.dropdown-content a {
  color: #333;
  padding: 6px 8px;
  text-decoration: none;
  display: block;
  font-size: 12px;
  transition: background-color 0.2s ease;
}

.dropdown-content a:hover {
  background-color: #f1f1f1;
}

.dropdown:hover .dropdown-content {
  display: block;
}

.dropbtn::after {
  content: '\25BC';
  font-size: 8px;
  margin-left: 4px;
}

.videoModal iframe {
  width: min(100%, 560px);
  max-width: 100%;
  aspect-ratio: 16 / 9;
  height: auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes pressDown {
  0% {
    transform: scale(1);
  }

  100% {
    transform: scale(0.8);
  }
}

@keyframes rainbow {
  to { background-position: 0 -200%; }
}

@keyframes fadeIn {
  0% { opacity: 0; }
  16% { opacity: 0; }
  100% { opacity: 1; }
}

@media (max-width: 720px) {
  .headerInner,
  .main-content {
    width: calc(100% - 16px);
  }

  .headerTopRow {
    align-items: stretch;
  }

  .searchTools {
    flex-wrap: wrap;
  }

  .searchContainer {
    width: 100%;
  }

  #output {
    width: 100%;
  }

  .tagPanel {
    max-height: 180px;
  }

}
