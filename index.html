<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8">
<style>
html {
  box-sizing: border-box;
  width: 100%;
  overflow-y: scroll;
  scrollbar-gutter: stable;
}

*, *::before, *::after {
  box-sizing: inherit;
}

body {
  font-family: Roboto, sans-serif;
  margin: 0;
  background: #f6f7f8;
  color: rgb(0 0 0 / 0.88);
}

li:nth-child(even) {
  background: rgb(0 0 0 / 0.005);
}

li {
  margin-bottom: 15px;
}

#appHeader {
  position: sticky;
  top: 0;
  z-index: 50;
  background: #fafafa;
  border-bottom: 1px solid rgb(0 0 0 / 0.12);
  box-shadow: 0 1px 4px rgb(0 0 0 / 0.06);
}

.headerInner,
.main-content {
  width: min(1100px, calc(100% - 24px));
  margin: 0 auto;
}

.headerInner {
  padding: 12px 0 10px;
}

.headerMetaRow {
  display: flex;
  justify-content: center;
  margin-bottom: 10px;
}

.headerTopRow {
  display: flex;
  align-items: stretch;
  gap: 12px;
}

.searchShell {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1 1 auto;
  min-width: 0;
}

.searchTools {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.searchContainer {
  display: flex;
  align-items: stretch;
  min-height: 42px;
  margin: 0;
  white-space: nowrap;
  gap: 0;
  flex: 1 1 auto;
}

#searchInput {
  flex-grow: 1;
  min-width: 0;
  padding: 8px 12px;
  font-size: 15px;
  border: 1px solid rgb(0 0 0 / 0.5);
  border-left: 0;
  box-shadow: 0 2px 5px rgb(0 0 0 / 0.1);
  border-radius: 0;
  border-top-right-radius: 16px;
  border-bottom-right-radius: 16px;
}

#searchInput:focus {
  outline: none;
  box-shadow: inset 0 0 3.5px rgb(0 0 0 / 0.133);
}

.filterToggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 10ch;
  background-color: #f8f9fa;
  padding: 7px 12px;
  font-size: 13px;
  border: 1px solid rgb(0 0 0 / 0.2);
  border-radius: 999px;
  cursor: pointer;
  color: rgb(0 0 0 / 0.78);
  box-shadow: 0 2px 5px rgb(0 0 0 / 0.08);
  transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}

.filterToggle:hover {
  background-color: #eceff1;
}

.filterToggle[aria-expanded="true"] {
  background-color: #111827;
  border-color: #111827;
  color: #fff;
  box-shadow: 0 3px 10px rgb(17 24 39 / 0.18);
}

#searchContainerId {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 0;
}

#searchContainerId:empty {
  display: none;
}

.tagPanel {
  overflow-y: auto;
  overflow-x: hidden;
  max-height: min(280px, 40vh);
  opacity: 1;
  transition: max-height 0.2s ease, opacity 0.2s ease, padding 0.2s ease;
  margin: 6px 0;
  padding: 4px 0 2px;
}

.tagPanel.collapsed {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
}

#tagBox {
  list-style-type: none;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 10px;
  padding: 0;
  margin: 0;
}

#videoBox {
  list-style-type: none;
  padding-left: 0;
  margin-top: 0;
  margin-bottom: 0;
}

#results {
  list-style-type: none;
  padding-left: 0;
  margin: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.resultItem {
  margin-bottom: 8px;
  padding: 4px 6px;
  border-radius: 10px;
  scroll-margin-top: 96px;
}

.resultItem.is-selected {
  background: linear-gradient(180deg, rgba(11, 178, 255, 0.01), rgba(11, 178, 255, 0.05));
  box-shadow:
    inset 0 0 0 1px rgb(26 115 232 / 0.42),
    inset 0 0 0 2px rgb(255 255 255 / 0.55);
}

.resultItem.is-selected a {
  text-decoration: underline;
}

#results a,
#results small,
#results sup,
#output {
  overflow-wrap: anywhere;
  word-break: break-word;
}

.main-content {
  overflow: visible;
  padding: 16px 0 24px;
}

#output {
  font-family: monospace;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: rgb(0 0 0 / 0.65);
  font-size: 12px;
  line-height: 1.3;
  padding: 0;
}

.footerLink {
  color: rgb(0 0 0 / 0.8);
}

.tagLink {
  white-space: nowrap;
  text-decoration: none;
  color: rgb(255 255 255);
  text-shadow: 0 1px 3px rgb(64 64 64);
  font-weight: 500;
  font-size: 14px;
  line-height: 250%;
  border: 1px solid rgb(0 0 0 / 0.3);
  border-radius: 10px;
  box-shadow: 0 2px 5px rgb(0 0 0 / 0.1);
  padding: 5px 7px;
  display: inline-flex;
  align-items: center;
}

.tagCounter {
  color: rgb(255 255 255);
  text-decoration: none;
  text-shadow: 0 2px 50px rgba(220 220 220 255);
  margin-left: 8px;
  padding: 0 2px;
}

.tagSearchPill {
  white-space: nowrap;
  text-decoration: none;
  color: rgb(255 255 255);
  text-shadow: 0 1px 3px rgb(64 64 64);
  font-weight: 700;
  border-style: solid;
  border-top: 1px solid rgb(0 0 0 / 0.3);
  border-bottom: 1px solid rgb(0 0 0 / 0.3);
  border-right: 1px solid rgb(0 0 0 / 0.3);
  border-left: 0;
  box-shadow: 0 2px 5px rgb(0 0 0 / 0.1);
  padding: 7px 10px;
  border-radius: 999px;
  margin: 0;
  cursor: pointer;
}

.mainDropdown {
  padding: 3.5px 10px 15px 12px;
  border-radius: 0;
  border-top-left-radius: 16px;
  border-bottom-left-radius: 16px;
  border: 1px double rgb(0 0 0 / 0.4);
  min-width: 52px;
}

.mainDropdownIdleAnim {
  background:
   linear-gradient(rgba(255, 0, 0, 1) 0%, rgba(255, 154, 0, 1) 10%, rgba(208, 222, 33, 1) 20%, rgba(79, 220, 74, 1) 30%, rgba(63, 218, 216, 1) 40%, rgba(47, 201, 226, 1) 50%, rgba(28, 127, 238, 1) 60%, rgba(95, 21, 242, 1) 70%, rgba(186, 12, 248, 1) 80%, rgba(251, 7, 217, 1) 90%, rgba(255, 0, 0, 1) 100%)
   0 0 / 100% 200%;
  animation: rainbow 10s linear infinite;
  animation-direction: forward;
}

.extraResultContent {
  background: linear-gradient(rgba(32, 32, 32, 0.9) 0%, rgba(0, 0, 0, 1) 10%, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0) 100%);
  width: min(100%, 560px);
  max-width: 100%;
  max-height: 100%;
  margin-top: 8px;
  border-radius: 16px;
}

.videoModal {
  width: min(100%, 560px);
  max-width: 100%;
}

.videoShowAnim {
  animation: fadeIn 0.3s cubic-bezier(0.32, 0, 0.67, 0);
}

.videoButton {
  border-radius: 8px;
  border: 1px solid rgb(0 0 0 / 0.4);
  padding-bottom: 3.5px;
  position: relative;
  top: -2px;
  margin-left: 3px;
}

.videoButton:active {
  animation: pressDown 0.066s cubic-bezier(0.33, 1, 0.68, 1) 1;
}

.videoCloseButton {
  float: right;
  border-radius: 16px;
  background-color: transparent;
  color: rgb(255 255 255);
  border: 1px solid rgb(0 0 0 / 0.01);
}

.logo:hover, logo:active {
  animation: pressDown 0.1s linear 1;
  animation-fill-mode: forwards;
  color: rgb(255 255 255);
  text-shadow: 0 1px 6px rgb(0 0 0 / 0.3);
  display: inline-block;
}

.loader {
  border: 6px double #f3f3f3;
  border-top: 6px solid rgb(0 0 0 / 0.66);
  border-radius: 50%;
  width: 33px;
  height: 33px;
  animation: spin 0.33s linear infinite;
  margin: 12px auto;
}

.modal-bar {
  align-items: center;
  padding: 8px 0 12px;
  width: 100%;
  box-sizing: border-box;
}

.modal-bar.hidden {
  display: none;
}

.dropdown {
  position: relative;
  display: inline-block;
}

.dropbtn {
  background-color: #f8f9fa;
  padding: 4px 8px;
  font-size: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.dropbtn:hover {
  background-color: #e9ecef;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #fff;
  min-width: 120px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  border: 1px solid #ddd;
  border-radius: 3px;
  z-index: 1;
}

.dropdown-content a {
  color: #333;
  padding: 6px 8px;
  text-decoration: none;
  display: block;
  font-size: 12px;
  transition: background-color 0.2s ease;
}

.dropdown-content a:hover {
  background-color: #f1f1f1;
}

.dropdown:hover .dropdown-content {
  display: block;
}

.dropbtn::after {
  content: '\25BC';
  font-size: 8px;
  margin-left: 4px;
}

.videoModal iframe {
  width: min(100%, 560px);
  max-width: 100%;
  aspect-ratio: 16 / 9;
  height: auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes pressDown {
  0% {
    transform: scale(1);
  }

  100% {
    transform: scale(0.8);
  }
}

@keyframes rainbow {
  to { background-position: 0 -200%; }
}

@keyframes fadeIn {
  0% { opacity: 0; }
  16% { opacity: 0; }
  100% { opacity: 1; }
}

@media (max-width: 720px) {
  .headerInner,
  .main-content {
    width: calc(100% - 16px);
  }

  .headerTopRow {
    align-items: stretch;
  }

  .searchTools {
    flex-wrap: wrap;
  }

  .searchContainer {
    width: 100%;
  }

  #output {
    width: 100%;
  }

  .tagPanel {
    max-height: 180px;
  }

}
</style>

<body onload="test()">
<div id="appHeader">

<script>
var url = 'https://raw.githubusercontent.com/auxc/auxc.github.io/refs/heads/main/searchdb.txt';
var storedText;
var searchIndex;

var splitWordsExp = /\(([^)]+)\)/g;
var tagExp = /([^:\s]+):([^:\s]+)/g;
var globalTags = new Array();
var globalResults = new Array();
var globalCategoryMap = new Map();
var allTags = new Map();
var tagColorMap = new Map();

var updateSearchTextHistoryTimer = null;
var selectedResultIndex = -1;
var selectedResultUrl = null;
var shouldScrollSelectedResultOnInitialLoad = false;

const SORTING_RELEVANCE = 0;
const SORTING_NEWEST = 1;
const SORTING_OLDEST = 2;

var sortingMode = SORTING_RELEVANCE;

var URL = 0;
var NAME = 1;
var DESCRIPTION = 2;
var CATEGORY = 3;
var KEYWORDS = 4;
var TIMESTAMP = 5;
var ARCHIVE_URL = 6;
var HEADER_WORD_COUNT = 7;

function test() {
  var input = document.getElementById('searchInput');
  input.addEventListener('keydown', onSearchInputKeyDown);
  document.addEventListener('keydown', onGlobalShortcutKeyDown);

  window.addEventListener('popstate', function() {
    grabTagsFromURL();
    grabSearchFromURL();
    grabSelectedResultFromURL();
    updateResults(false);
  });

  initModalBar();
  grabTagsFromURL();
  grabSearchFromURL();
  grabSelectedResultFromURL();
  shouldScrollSelectedResultOnInitialLoad = selectedResultUrl !== null;

  storedText = localStorage.getItem('cacheddb');

  if (storedText)
    done();

  fetch(url)
    .then(function(response) {
      response.text().then(function(text) {
        if (storedText === text)
          return;

        storedText = text;
        done();
        localStorage.setItem('cacheddb', text);
      });
    });
}

function initModalBar() {
  var dropbtn = document.querySelector('.dropbtn');
  var dropdownContent = document.querySelector('.dropdown-content');

  dropdownContent.addEventListener('click', function(e) {
    if (e.target.tagName === 'A') {
      e.preventDefault();
      sortingMode = e.target.getAttribute('data-sort');
      dropbtn.textContent = 'Sort by: ' + e.target.textContent;
      updateResults(false);
    }
  });
}

function showModalBar(show) {
  var modalBar = document.querySelector('.modal-bar');

  if (show)
    modalBar.classList.remove('hidden');
  else
    modalBar.classList.add('hidden');
}

function toggleTagPanel(forceState) {
  var panel = document.getElementById('tagPanel');
  var button = document.getElementById('tagToggleButton');
  var shouldShow = forceState;

  if (typeof shouldShow !== 'boolean')
    shouldShow = panel.classList.contains('collapsed');

  panel.classList.toggle('collapsed', !shouldShow);
  refreshTagToggleLabel();
  button.setAttribute('aria-expanded', shouldShow ? 'true' : 'false');
}

function refreshTagToggleLabel() {
  var button = document.getElementById('tagToggleButton');
  var count = document.getElementById('tagBox').childElementCount;
  var label = 'Tags';

  if (count > 0)
    label += ' (' + count + ')';

  button.textContent = label;
  button.setAttribute('aria-label', label);
}

function setURLParams(newParams, options) {
  options = options || {};
  var push = options.push !== undefined ? options.push : true;
  var arraySep = options.arraySep || ',';
  var sp = new URLSearchParams(window.location.search);

  Object.entries(newParams).forEach(function(entry) {
    var k = entry[0];
    var v = entry[1];

    if (v === null || v === undefined || v === '') {
      sp.delete(k);
    } else if (Array.isArray(v)) {
      if (v.length === 0)
        sp.delete(k);
      else
        sp.set(k, v.join(arraySep));
    } else {
      sp.set(k, String(v));
    }
  });

  var qs = sp.toString();
  var hash = window.location.hash || '';
  var path = window.location.pathname || '';
  var nextUrl = path + (qs ? '?' + qs : '') + hash;

  window.history[push ? 'pushState' : 'replaceState']({}, '', nextUrl);
}

function getURLParam(name, options) {
  options = options || {};
  var asArray = options.asArray || false;
  var delimiter = options.delimiter || ',';
  var params = new URLSearchParams(window.location.search);
  var raw = params.get(name);
  if (raw === null)
    return asArray ? [] : null;
  return asArray ? raw.split(delimiter).filter(function(s) { return s.length; }) : raw;
}

function grabTagsFromURL() {
  globalTags = getURLParam('tags', { asArray: true });
}

function grabSearchFromURL() {
  var inputEl = document.getElementById('searchInput');
  var sp = new URLSearchParams(window.location.search);
  var q = sp.get('q');
  inputEl.value = q || '';
}

function normalizeURLValue(urlValue) {
  if (!urlValue)
    return null;

  try {
    return new window.URL(urlValue, window.location.href).href;
  } catch (error) {
    return null;
  }
}

function grabSelectedResultFromURL() {
  selectedResultUrl = getURLParam('selected');
  selectedResultIndex = -1;
}

function done() {
  searchIndex = storedText.split('\n');
  document.getElementById('indexMeta').innerHTML = ' &middot; <a class="footerLink" href="searchdb.txt">index(' + searchIndex.length + ')</a>';
  showAllTags();
  toggleTagPanel(false);
  updateResults(false);
}

function resetSearch() {
  document.getElementById('searchInput').value = '';
  globalTags.length = 0;
  clearSelectedResult();
  toggleTagPanel(false);
  updateResults(true);
}

function updateResults(shouldRecordHistory, updateFromSearchInput) {
  if (updateFromSearchInput === undefined)
    updateFromSearchInput = false;

  var ul = document.getElementById('results');
  var previousSelectedIndex = updateFromSearchInput ? -1 : selectedResultIndex;
  var previousSelectedUrl = updateFromSearchInput ? null : selectedResultUrl;

  if (updateFromSearchInput) {
    selectedResultIndex = -1;
    selectedResultUrl = null;
    setURLParams({ selected: null }, { push: false });
  }

  while (ul.firstChild) {
    ul.removeChild(ul.firstChild);
  }

  globalResults.length = 0;
  globalCategoryMap.clear();

  var inputElement = document.getElementById('searchInput');
  var rawInput = inputElement.value;
  var inputStr = rawInput.trim();
  var filterStrings = inputStr.split(' ');

  for (var i = 0; i < filterStrings.length; i++) {
    var next = filterStrings[i];

    if (!next || next[next.length - 1] != ':')
      continue;

    filterStrings.splice(i, 1);
    i--;

    globalTags.push(next.replace(':', '').toLowerCase());
    shouldRecordHistory = true;
  }

  var activeTagExp = null;
  if (globalTags.length > 0) {
    var tagExpPattern = '(?=.*(?:^|\\s)' + globalTags.map(function(tag) {
      return tag.replace(/#/g, '\\#');
    }).join('(?:\\s|$))(?=.*(?:^|\\s)') + '(?:\\s|$))';
    activeTagExp = new RegExp(tagExpPattern);
  }

  var anyTags = globalTags.length > 0;
  var forceNewest = rawInput.length == 0 && !anyTags;
  var searchTextToDisplay = filterStrings.join(' ');

  if (rawInput.endsWith(' ') && searchTextToDisplay.length > 0)
    searchTextToDisplay += ' ';

  inputElement.value = searchTextToDisplay;

  if (inputStr == '' || globalTags.length > 0 && (filterStrings.length == 0 || inputStr == '')) {
    filterStrings = ['('];
  }

  var searchSansTags = filterStrings.join(' ');
  var tokens = [];
  var singleWordsOrQuotedStrings = /"([^"]+)"|\S+/g;
  var match;
  while ((match = singleWordsOrQuotedStrings.exec(searchSansTags)) !== null) {
    tokens.push(match[1] || match[0]);
  }

  var escapedWords = tokens
    .map(function(w) { return w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); })
    .filter(function(w) { return w.length > 0; });
  var filterExp = new RegExp('(' + escapedWords.join('|') + ')', 'ig');
  var scoredMatches = new Map();

  searchIndex.forEach(function(entry) {
    if (entry.length == 0)
      return;

    var matches = [];

    entry.replace(filterExp, function(matchedWord) {
      matches.push(Array.prototype.slice.call(arguments, 1).filter(Boolean));
    });

    var entryLower = entry.toLowerCase();
    var matchedTokenCount = 0;

    tokens.forEach(function(token) {
      if (entryLower.includes(token.toLowerCase()))
        matchedTokenCount++;
    });

    matches.forEach(function(localMatch) {
      var input = localMatch[0];
      var wordAtIndex = getWordAtIndex(localMatch[2], localMatch[1]);

      if (!wordAtIndex)
        return;

      var output = stripParentheses(wordAtIndex, ['(', ')', '.', ',', '"']);

      if (!output)
        return;

      if (output.startsWith('http://') || output.startsWith('https://'))
        return;

      var wordIndex = countCharacterOccurrences(localMatch[2], ')', 0, localMatch[1]);
      var penaltyMultiplier = 1;
      var flatPenalty = 0;

      switch (wordIndex) {
        case URL:
          penaltyMultiplier = 100;
          break;
        case NAME:
          penaltyMultiplier = 1;
          break;
        case DESCRIPTION:
          penaltyMultiplier = 50;
          flatPenalty = 1;
          break;
        case CATEGORY:
          penaltyMultiplier = 75;
          flatPenalty = 1;
          break;
        case KEYWORDS:
          penaltyMultiplier = 100;
          flatPenalty = 1;
          break;
        case ARCHIVE_URL:
          penaltyMultiplier = 100;
          break;
      }

      var tokenMatchCountScore = matchedTokenCount > 1 ? matchedTokenCount * 1000 : 0;
      var score = -getLevenshteinDistance(input, output) * penaltyMultiplier - flatPenalty + tokenMatchCountScore;

      var scoredMatch = {
        searchTerm: input,
        match: output,
        score: score,
        wordIndex: wordIndex,
        totalMatches: 1,
        line: localMatch[2],
        timestamp: getNthBracketedItem(localMatch[2], TIMESTAMP)
      };

      if (scoredMatches.has(localMatch[2])) {
        var existing = scoredMatches.get(localMatch[2]);
        existing.totalMatches++;

        if (existing.score < score)
          scoredMatches.set(localMatch[2], scoredMatch);
      } else {
        scoredMatches.set(localMatch[2], scoredMatch);
      }
    });
  });

  var scoredArr = [];
  scoredMatches.forEach(function(value) {
    scoredArr.push(value);
  });

  var mode = forceNewest ? SORTING_NEWEST : parseInt(sortingMode);
  if (mode === SORTING_RELEVANCE) {
    scoredArr.sort(function(x, y) { return y.score - x.score; });
  } else if (mode === SORTING_NEWEST) {
    scoredArr.sort(function(x, y) {
      if (x.timestamp === y.timestamp)
        return y.score - x.score;
      return y.timestamp - x.timestamp;
    });
  } else if (mode === SORTING_OLDEST) {
    scoredArr.sort(function(x, y) {
      if (x.timestamp === y.timestamp)
        return y.score - x.score;
      return x.timestamp - y.timestamp;
    });
  } else {
    scoredArr.sort(function(x, y) { return y.score - x.score; });
  }

  var showingAny = false;
  var liHTML = '';

  scoredArr.forEach(function(scoredMatch) {
    if (!scoredMatch)
      return;

    var words = scoredMatch.line.match(splitWordsExp);
    var category = stripParentheses(words[CATEGORY], ['(', ')']);

    if (anyTags && !activeTagExp.test(category))
      return;

    var htmlResult = getResultString(scoredMatch.line, globalResults.length);
    if (htmlResult.length == 0)
      return;

    liHTML += htmlResult;
    showingAny = true;
    globalResults.push(scoredMatch);
  });

  ul.insertAdjacentHTML('beforeEnd', liHTML);

  showAllTags();
  updateSearchPills(shouldRecordHistory);
  restoreSelectedResult(previousSelectedUrl, previousSelectedIndex);

  if (updateFromSearchInput) {
    clearTimeout(updateSearchTextHistoryTimer);
    updateSearchTextHistoryTimer = setTimeout(function() {
      setURLParams({ q: searchTextToDisplay }, { push: true });
    }, 500);
  }

  document.getElementById('mainButton').classList.toggle('mainDropdownIdleAnim', showingAny);
  showModalBar(globalResults.length > 1 && !forceNewest);

  if (!/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent))
    inputElement.focus();
}

function getWordAtIndex(str, index) {
  if (!str)
    return '';

  var words = str.split(/\s+/);
  var currentPosition = 0;
  var currentWord = null;

  for (var i = 0; i < words.length; i++) {
    var endPosition = currentPosition + words[i].length;

    if (index >= currentPosition && index < endPosition) {
      currentWord = words[i];
      break;
    }

    currentPosition = endPosition + 1;
  }

  return currentWord;
}

function getNthBracketedItem(str, index) {
  var matches = str.match(/\(([^)]+)\)/g);

  if (!matches || index < 0 || index >= matches.length)
    return null;

  return matches[index].slice(1, -1);
}

function getLevenshteinDistance(s, t) {
  if (s === t)
    return 0;

  var n = s.length;
  var m = t.length;
  if (n === 0 || m === 0)
    return n + m;

  var x = 0;
  var y;
  var a, b, c, d, g, h;
  var p = new Uint16Array(n);
  var u = new Uint32Array(n);
  for (y = 0; y < n;) {
    u[y] = s.charCodeAt(y);
    p[y] = ++y;
  }

  for (; (x + 3) < m; x += 4) {
    var e1 = t.charCodeAt(x);
    var e2 = t.charCodeAt(x + 1);
    var e3 = t.charCodeAt(x + 2);
    var e4 = t.charCodeAt(x + 3);
    c = x;
    b = x + 1;
    d = x + 2;
    g = x + 3;
    h = x + 4;
    for (y = 0; y < n; y++) {
      a = p[y];
      if (a < c || b < c) {
        c = (a > b ? b + 1 : a + 1);
      } else if (e1 !== u[y]) {
        c++;
      }

      if (c < b || d < b) {
        b = (c > d ? d + 1 : c + 1);
      } else if (e2 !== u[y]) {
        b++;
      }

      if (b < d || g < d) {
        d = (b > g ? g + 1 : b + 1);
      } else if (e3 !== u[y]) {
        d++;
      }

      if (d < g || h < g) {
        g = (d > h ? h + 1 : d + 1);
      } else if (e4 !== u[y]) {
        g++;
      }
      p[y] = h = g;
      g = d;
      d = b;
      b = c;
      c = a;
    }
  }

  for (; x < m;) {
    var e = t.charCodeAt(x);
    c = x;
    d = ++x;
    for (y = 0; y < n; y++) {
      a = p[y];
      if (a < c || d < c) {
        d = (a > d ? d + 1 : a + 1);
      } else if (e !== u[y]) {
        d = c + 1;
      } else {
        d = c;
      }
      p[y] = d;
      c = a;
    }
    h = d;
  }

  return h;
}

function getResultElements() {
  return Array.prototype.slice.call(document.querySelectorAll('#results .resultItem'));
}

function syncSelectedResultUI() {
  var resultElements = getResultElements();
  var inputElement = document.getElementById('searchInput');

  resultElements.forEach(function(element, index) {
    var isSelected = index === selectedResultIndex;
    element.classList.toggle('is-selected', isSelected);
  });

  if (selectedResultIndex >= 0 && selectedResultIndex < resultElements.length)
    inputElement.setAttribute('aria-activedescendant', resultElements[selectedResultIndex].id);
  else
    inputElement.removeAttribute('aria-activedescendant');
}

function clearSelectedResult() {
  selectedResultIndex = -1;
  selectedResultUrl = null;
  syncSelectedResultUI();
  setURLParams({ selected: null }, { push: false });
}

function scrollSelectedResultIntoView(element, options) {
  if (!element)
    return;

  options = options || {};
  var header = document.getElementById('appHeader');
  var headerHeight = header ? header.offsetHeight : 0;
  var viewportHeight = window.innerHeight || document.documentElement.clientHeight;
  var topPadding = 8;
  var bottomPadding = 8;
  var rect = element.getBoundingClientRect();
  var currentScrollY = window.scrollY || window.pageYOffset;
  var visibleTop = headerHeight + topPadding;
  var visibleBottom = viewportHeight - bottomPadding;
  var targetScrollY;
  var alignTop = options.alignTop === true;

  if (alignTop) {
    targetScrollY = currentScrollY + rect.top - visibleTop;
    window.scrollTo(0, Math.max(0, Math.round(targetScrollY)));
    return;
  }

  if (rect.height >= visibleBottom - visibleTop) {
    targetScrollY = currentScrollY + rect.top - visibleTop;
    window.scrollTo(0, Math.max(0, Math.round(targetScrollY)));
    return;
  }

  if (rect.top < visibleTop) {
    targetScrollY = currentScrollY + rect.top - visibleTop;
    window.scrollTo(0, Math.max(0, Math.round(targetScrollY)));
    return;
  }

  if (rect.bottom > visibleBottom) {
    targetScrollY = currentScrollY + rect.bottom - visibleBottom;
    window.scrollTo(0, Math.max(0, Math.round(targetScrollY)));
  }
}

function setSelectedResultIndex(index, options) {
  options = options || {};
  var shouldScroll = options.scroll !== false;
  var shouldPushHistory = options.pushHistory !== false;
  var shouldAlignTop = options.alignTop === true;
  var resultElements = getResultElements();

  if (index < 0 || index >= resultElements.length) {
    clearSelectedResult();
    return false;
  }

  selectedResultIndex = index;
  var primaryLink = resultElements[index].querySelector('.resultPrimaryLink');
  selectedResultUrl = primaryLink ? (primaryLink.getAttribute('href') || primaryLink.href) : null;
  syncSelectedResultUI();
  setURLParams({ selected: selectedResultUrl }, { push: shouldPushHistory });

  if (shouldScroll)
    scrollSelectedResultIntoView(resultElements[index], { alignTop: shouldAlignTop });

  return true;
}

function restoreSelectedResult(previousSelectedUrl, previousSelectedIndex) {
  var resultElements = getResultElements();

  if (resultElements.length == 0) {
    clearSelectedResult();
    return;
  }

  if (previousSelectedUrl) {
    var normalizedPreviousSelectedUrl = normalizeURLValue(previousSelectedUrl);

    for (var i = 0; i < resultElements.length; i++) {
      var primaryLink = resultElements[i].querySelector('.resultPrimaryLink');
      var currentResultRawUrl = primaryLink ? (primaryLink.getAttribute('href') || primaryLink.href) : null;
      var currentResultUrl = normalizeURLValue(currentResultRawUrl);

      if (currentResultRawUrl === previousSelectedUrl || (currentResultUrl && normalizedPreviousSelectedUrl && currentResultUrl === normalizedPreviousSelectedUrl)) {
        setSelectedResultIndex(i, {
          scroll: shouldScrollSelectedResultOnInitialLoad,
          pushHistory: false,
          alignTop: shouldScrollSelectedResultOnInitialLoad
        });
        shouldScrollSelectedResultOnInitialLoad = false;
        return;
      }
    }

    shouldScrollSelectedResultOnInitialLoad = false;
    clearSelectedResult();
    return;
  }

  if (previousSelectedIndex >= 0) {
    setSelectedResultIndex(Math.min(previousSelectedIndex, resultElements.length - 1), { scroll: false, pushHistory: false });
    shouldScrollSelectedResultOnInitialLoad = false;
    return;
  }

  shouldScrollSelectedResultOnInitialLoad = false;
  clearSelectedResult();
}

function moveSelectedResult(delta) {
  var resultElements = getResultElements();
  var resultCount = resultElements.length;

  if (resultCount == 0)
    return false;

  if (selectedResultIndex === -1)
    return setSelectedResultIndex(delta >= 0 ? 0 : resultCount - 1);

  var nextIndex = (selectedResultIndex + delta + resultCount) % resultCount;
  return setSelectedResultIndex(nextIndex);
}

function openSelectedResult() {
  var resultElements = getResultElements();

  if (selectedResultIndex < 0 || selectedResultIndex >= resultElements.length)
    return false;

  var primaryLink = resultElements[selectedResultIndex].querySelector('.resultPrimaryLink');
  if (!primaryLink)
    return false;

  window.location.href = primaryLink.href;
  return true;
}

function getResultString(rawResult, resultIndex) {
  var urlValue;
  var name;
  var description;
  var category;
  var timestamp;
  var archiveUrl;
  var resultWords = rawResult.match(splitWordsExp);

  if (!resultWords)
    return '';

  for (var i = 0; i < HEADER_WORD_COUNT; i++) {
    var word = stripParentheses(resultWords[i], ['(', ')']);

    switch (i) {
      case URL:
        urlValue = word;
        break;
      case NAME:
        name = word;
        break;
      case DESCRIPTION:
        description = word;
        break;
      case CATEGORY:
        word.split(' ').forEach(function(cat) {
          if (globalCategoryMap.has(cat))
            globalCategoryMap.get(cat).val++;
          else
            globalCategoryMap.set(cat, { val: 1 });
        });
        category = word;
        break;
      case TIMESTAMP:
        timestamp = new Date(parseInt(word) * 1000).toLocaleString(undefined, { dateStyle: 'medium' });
        break;
      case ARCHIVE_URL:
        archiveUrl = word;
        break;
    }
  }

  var embedInfo = tryGetEmbedHTML(urlValue);
  var extraButtonHtml = '';
  var extraContentHtml = '';

  if (embedInfo.success) {
    extraButtonHtml = embedInfo.buttonHtml;
    extraContentHtml = '<div class="extraResultContent" id="' + embedInfo.id + '"></div>';
  }

  var archiveLinkHtml = '';
  if (archiveUrl && archiveUrl !== 'MISSING_ARCHIVE_LINK' && archiveUrl !== 'SITE_NOT_ARCHIVABLE' &&
    (archiveUrl.startsWith('http://') || archiveUrl.startsWith('https://'))) {
    archiveLinkHtml = ' &middot; <a href="' + archiveUrl + '">archive</a>';
  }

  return '<li class="resultItem" id="result-item-' + resultIndex + '" data-result-index="' + resultIndex + '"><b><a class="resultPrimaryLink" href="' + urlValue + '">' + name + '</a> ' + extraButtonHtml + '</b><br><small><sup>' + category + ' &middot; ' + timestamp + archiveLinkHtml + ' &middot; ' + urlValue + '</sup></small><br class="smallSpace">' + description + extraContentHtml + '</li>';
}

function stripParentheses(str, symbols) {
  symbols.forEach(function(x) {
    str = str.replaceAll(x, '');
  });

  return str;
}

function countCharacterOccurrences(str, character, startIndex, endIndex) {
  var count = 0;

  for (var i = startIndex; i <= endIndex; i++) {
    if (str[i] === character)
      count++;
  }

  return count;
}

function showAllTags() {
  if (allTags.size == 0) {
    searchIndex.forEach(function(element) {
      if (!element)
        return;
      addTag(element, allTags);
    });
  }

  var sortedKeys = new Array();

  allTags.forEach(function(value, key) {
    if (globalCategoryMap.size > 0 && !globalCategoryMap.has(key))
      return;

    if (globalCategoryMap.size > 0 && globalCategoryMap.get(key).val >= globalResults.length)
      return;

    var localCount = globalCategoryMap.size > 0 ? globalCategoryMap.get(key).val : value.val;
    sortedKeys.push({ name: key, count: localCount });
  });

  sortedKeys.sort(function(x, y) {
    return y.count - x.count;
  });

  var tagHtml = '';
  var counter = 0;
  sortedKeys.forEach(function(key) {
    var color01 = counter / sortedKeys.length;
    var localCount = globalCategoryMap.size > 0 ? globalCategoryMap.get(key.name).val : key.count;
    tagHtml += getTagLinkHtml(key.name + ':', key.name, String(localCount), color01, key.name) + ' ';
    counter++;
  });

  var tagList = document.getElementById('tagBox');

  while (tagList.firstChild) {
    tagList.removeChild(tagList.firstChild);
  }

  if (globalResults.length != 1 && sortedKeys.length > 0)
    tagList.insertAdjacentHTML('beforeend', tagHtml);

  refreshTagToggleLabel();
}

function addTag(element, tagMap) {
  var allWords = element.match(splitWordsExp);

  if (!allWords)
    return;

  var tagWord = stripParentheses(allWords[CATEGORY], ['(', ')']);
  if (tagWord.length == 0)
    return;

  tagWord.split(' ').forEach(function(tag) {
    if (!tag)
      return;

    if (tagMap.has(tag))
      tagMap.get(tag).val++;
    else
      tagMap.set(tag, { val: 1 });
  });
}

function getTagLinkHtml(urlValue, text, suffix, color01, tag) {
  var a = [0.5, 0.5, 0.5];
  var b = [0.5, 0.2, 0.3];
  var c = [1.0, 1.0, 1.0];
  var d = [0.0, 0.3, 0.6];
  var bgColor01 = cosinePalette(color01, a, b, c, d);
  var bgColor = (bgColor01[0] * 255) + ' ' + (bgColor01[1] * 255) + ' ' + (bgColor01[2] * 255);

  if (tagColorMap.has(tag))
    tagColorMap.get(tag).color = bgColor;
  else
    tagColorMap.set(tag, { color: bgColor });

  return '<a href="' + urlValue + '" class="tagLink" style="background-color: rgb(' + bgColor + ');" onclick="return resultOnClick(this)">' + text + '<span class="tagCounter">' + suffix + '</span></a>';
}

function cosinePalette(col01, a, b, c, d) {
  return [
    a[0] + b[0] * Math.cos(6.28318 * (c[0] * col01 + d[0])),
    a[1] + b[1] * Math.cos(6.28318 * (c[1] * col01 + d[1])),
    a[2] + b[2] * Math.cos(6.28318 * (c[2] * col01 + d[2]))
  ];
}

function updateSearchPills(shouldRecordHistory) {
  var doc = document.getElementById('searchContainerId');

  while (doc.firstChild) {
    doc.removeChild(doc.firstChild);
  }

  globalTags.forEach(function(x) {
    var bgColor = '230, 230, 230';

    if (tagColorMap.has(x))
      bgColor = tagColorMap.get(x).color;

    doc.insertAdjacentHTML('beforeend', getSearchPillHtml(x, bgColor));
  });

  if (shouldRecordHistory)
    setURLParams({ tags: globalTags }, { push: true });
}

function getSearchPillHtml(tag, bgColor) {
  return '<button class="tagSearchPill" onclick="onTagSearchPillClick(this)" style="background-color: rgb(' + bgColor + ');">' + tag + ' &times;</button>';
}

function resultOnClick(arg) {
  var searchString = document.getElementById('searchInput').value;
  searchString = arg.getAttribute('href') + ' ' + searchString;
  document.getElementById('searchInput').value = searchString;
  updateResults(true);
  return false;
}

function onTagSearchPillClick(button) {
  var tag = button.textContent.split(' ')[0];
  var index = globalTags.indexOf(tag);

  if (index == -1)
    return;

  globalTags.splice(index, 1);
  updateResults(true);
}

function onGlobalShortcutKeyDown(event) {
  var key = event.key;

  if (event.ctrlKey && !event.altKey && !event.metaKey && key === 'ArrowDown') {
    event.preventDefault();
    moveSelectedResult(1);
    return;
  }

  if (event.ctrlKey && !event.altKey && !event.metaKey && key === 'ArrowUp') {
    event.preventDefault();
    moveSelectedResult(-1);
    return;
  }

  if (key === 'Enter' && event.ctrlKey) {
    if (selectedResultIndex !== -1) {
      event.preventDefault();
      openSelectedResult();
      return;
    }

    var rawInput = document.getElementById('searchInput').value;

    if (rawInput.length > 0)
      window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(rawInput);
  }
}

function onSearchInputKeyDown(event) {
  var key = event.key;
  var refreshResults = false;

  if (key === 'Escape' && selectedResultIndex !== -1) {
    event.preventDefault();
    clearSelectedResult();
    return;
  }

  if (key === 'Enter' && selectedResultIndex !== -1) {
    event.preventDefault();
    openSelectedResult();
    return;
  }

  if (key === 'Backspace') {
    var shouldDelete = event.target.selectionStart == 0 && globalTags.length > 0;

    if (shouldDelete) {
      globalTags.length = Math.max(globalTags.length - 1, 0);
      refreshResults = true;
    }
  }

  if (refreshResults)
    updateResults(true);
}

function tryGetEmbedHTML(urlValue) {
  if (urlValue.includes('youtu.be')) {
    var shortVideoId = urlValue.split('be/')[1];
    return {
      success: true,
      buttonHtml: '<button type="button" class="videoButton" value="' + shortVideoId + '" onClick="videoPopup(this)">&#x1F4FA;</button>',
      id: shortVideoId
    };
  }

  if (urlValue.includes('youtube.com/playlist')) {
    var playlistBits = urlValue.split('list=')[1].split('&si=');
    var playlistId = playlistBits[0];
    var playlistVideoId = playlistBits[1];
    return {
      success: true,
      buttonHtml: '<button type="button" class="videoButton" value="' + playlistVideoId + '@' + playlistId + '" onClick="videoPopup(this)">&#x1F4FA;</button>',
      id: playlistVideoId + '@' + playlistId
    };
  }

  if (urlValue.includes('youtube.com/watch')) {
    var queryBits = urlValue.split('v=')[1];
    var queryParts = queryBits.split('&list=');
    var watchVideoId = queryParts[0];
    var watchPlaylistId = queryParts[1];

    if (watchPlaylistId) {
      return {
        success: true,
        buttonHtml: '<button type="button" class="videoButton" value="' + watchVideoId + '@' + watchPlaylistId + '" onClick="videoPopup(this)">&#x1F4FA;</button>',
        id: watchVideoId + '@' + watchPlaylistId
      };
    }

    return {
      success: true,
      buttonHtml: '<button type="button" class="videoButton" value="' + watchVideoId + '" onClick="videoPopup(this)">&#x1F4FA;</button>',
      id: watchVideoId
    };
  }

  return { success: false };
}

function videoPopup(idOwnerElement) {
  var element = document.getElementById(idOwnerElement.value);

  if (element.childNodes.length > 0)
    return;

  var valueParts = idOwnerElement.value.split('@');
  var videoId = valueParts[0];
  var playlist = valueParts[1];
  var html = '';

  if (playlist) {
    html = '<button class="videoCloseButton" value="' + idOwnerElement.value + '" onClick="videoClose(this)"><b>&times;&nbsp;&nbsp;</b></button><div class="videoModal">' + getPlaylistHtml(playlist, videoId) + '</div>';
  } else {
    html = '<button class="videoCloseButton" value="' + idOwnerElement.value + '" onClick="videoClose(this)"><b>&times;&nbsp;&nbsp;</b></button><div class="videoModal">' + getSingleVideoHtml(videoId) + '</div>';
  }

  element.insertAdjacentHTML('afterbegin', html);
  element.classList.toggle('videoShowAnim', true);
}

function videoClose(idOwnerElement) {
  var element = document.getElementById(idOwnerElement.value);
  element.classList.toggle('videoShowAnim', false);

  while (element.firstChild) {
    element.removeChild(element.firstChild);
  }
}

function getPlaylistHtml(playlistId, videoId) {
  return '<iframe src="https://www.youtube.com/embed/videoseries?si=' + videoId + '&amp;list=' + playlistId + '" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>';
}

function getSingleVideoHtml(videoId) {
  return '<iframe src="https://www.youtube.com/embed/' + videoId + '" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>';
}
</script>
